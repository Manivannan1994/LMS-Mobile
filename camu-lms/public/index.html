<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%PUBLIC_URL%/lms-root/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Camu LMS 2.0 brings the joy back in teaching and learning, by giving academic personnel the power of speed, simplicity and versatility" />

  <!--
      manifest.json provides metadata used when your web app is installed on a

  <link rel="manifest" href="%PUBLIC_URL%/lms-root/manifest.json" />
  <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will

    -->
  <title>Camu LMS</title>
  <style type="text/css">
    .disable-page-onloading {
      opacity: 0.5;
      /* Adjust opacity for disabled effect */
      pointer-events: none;
      /* Disable user interaction */
    }
  </style>

</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>

    <script async defer src="https://apis.google.com/js/api.js"></script>
    <script async defer src="https://accounts.google.com/gsi/client"></script>
    <script>
      if ("serviceWorker" in navigator) {
